services:
  - type: web
    name: fruit-store
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && cd fruit_store && python manage.py collectstatic --noinput
    startCommand: cd fruit_store && python manage.py migrate && python manage.py create_sample_data && gunicorn settings:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
