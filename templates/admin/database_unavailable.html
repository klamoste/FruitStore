{% extends "admin/base_site.html" %}

{% block content %}
<div style="max-width: 760px; margin: 2rem 0; padding: 1.5rem; border: 1px solid #f0d98c; border-radius: 12px; background: #fff8dc;">
    <h1 style="margin-top: 0; font-size: 2rem;">Database unavailable</h1>
    <p style="font-size: 1rem; line-height: 1.6; margin-bottom: 1rem;">
        {{ message }}
    </p>
    <p style="font-size: 1rem; line-height: 1.6; margin-bottom: 0;">
        The storefront can still show demo products, but admin tools need a writable production database such as PostgreSQL.
    </p>
</div>
{% endblock %}
